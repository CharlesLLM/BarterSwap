services:
  go:
    build:
      dockerfile: docker/Dockerfile
    user: go
    working_dir: /home/go
    command: go run .
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    volumes:
      - .:/home/go

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barterswap
      POSTGRES_PASSWORD: barterswap
      POSTGRES_DB: barterswap
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barterswap"]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - barterswap_data:/var/lib/postgresql/data

volumes:
  barterswap_data:
